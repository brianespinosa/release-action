name: Release

on:
  push:
    branches: [main]
  pull_request_target:
    types: [opened, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    uses: brianespinosa/release-action/.github/workflows/release-workflow.yml@main
    with:
      trigger: ${{ github.event_name }}
    secrets: inherit
