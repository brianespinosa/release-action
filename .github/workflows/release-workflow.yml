name: Release Workflow

on:
  workflow_call:
    inputs:
      trigger:
        description: The calling repo's github.event_name
        required: true
        type: string

jobs:
  # Runs on every trigger (push and pull_request_target) to catch misconfigured
  # repository settings before a bad merge can land. Squash merge must be enabled
  # and merge commits must be disabled — both are required for git-cliff to produce
  # correct semver bumps from PR titles used as squash commit messages.
  #
  # IMPORTANT: Branch protection rules must require the overall workflow status,
  # not individual job statuses. When init-check fails, downstream jobs are
  # skipped (neutral) not failed. A rule requiring only 'release' to pass
  # will not block merges when init-check fails.
  init-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Init check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          if ! REPO_DATA=$(gh api "/repos/$REPO"); then
            echo "ERROR: gh api call failed for repo '${REPO}'."
            echo "  Check that GH_TOKEN is valid and has repository read scope."
            exit 1
          fi

          SQUASH=$(echo "$REPO_DATA" | jq -r '.allow_squash_merge')
          MERGE=$(echo "$REPO_DATA" | jq -r '.allow_merge_commit')

          # GitHub only returns allow_squash_merge and allow_merge_commit for tokens
          # with admin access. The github.token in a workflow_call context only has
          # the scopes granted in permissions: — admin is not a grantable scope.
          # When both fields are absent, degrade gracefully: warn and skip the check.
          # If only one field is absent that is unexpected and treated as an error.
          if [[ "$SQUASH" == "null" && "$MERGE" == "null" ]]; then
            echo "WARNING: Merge settings are not visible with the current token permissions."
            echo "  allow_squash_merge and allow_merge_commit require admin API access."
            echo "  Cannot enforce merge configuration at runtime with github.token."
            echo "  Verify manually: allow_squash_merge=true, allow_merge_commit=false."
          elif [[ "$SQUASH" == "null" || "$MERGE" == "null" ]]; then
            echo "ERROR: Unexpected partial API response — only some merge setting fields were returned."
            echo "  allow_squash_merge: ${SQUASH}"
            echo "  allow_merge_commit: ${MERGE}"
            exit 1
          elif [[ "$SQUASH" != "true" || "$MERGE" != "false" ]]; then
            echo "ERROR: Repository must have squash merge enabled and merge commits disabled."
            echo "  allow_squash_merge: $SQUASH (expected: true)"
            echo "  allow_merge_commit: $MERGE (expected: false)"
            exit 1
          else
            echo "Repository merge settings verified: squash merge enabled, merge commits disabled."
          fi

  # Runs when the caller passes trigger: push — by convention, when the calling
  # workflow's push event fires on the main branch. The branch filter is enforced
  # by the caller, not by this reusable workflow.
  # Calculates the next semver version from conventional commits since the last
  # tag, generates a changelog, creates a GitHub release, and force-updates the
  # vN and vN.M alias tags to the new commit. Skips automatically when no
  # version-bump-worthy commits exist since the last tag.
  release:
    if: inputs.trigger == 'push'
    needs: init-check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required for git-cliff to walk all commits
          fetch-tags: true # tags required to determine the current version baseline

      # The cliff.toml config is bundled here rather than committed to consuming
      # repos so that all consumers share a single canonical configuration.
      # It is written from an env var rather than a shell heredoc — heredocs require
      # the EOF marker at column 0, but the YAML literal block parser terminates
      # run: | at any line with less indentation than the block's first content line.
      # These constraints are mutually exclusive; using env: avoids the conflict.
      - name: Write cliff.toml
        env:
          CLIFF_TOML: |
            [changelog]
            header = ""
            body = """
            {% for group, commits in commits | group_by(attribute="group") %}
            ### {{ group | upper_first }}\n
            {% for commit in commits %}
            - {{ commit.message | upper_first }}\
            {% endfor %}
            {% endfor %}
            """
            trim = true

            [git]
            conventional_commits = true
            filter_unconventional = true
            filter_commits = false
            # Restricts git-cliff to full semver tags only (e.g. v1.2.3).
            # Excludes alias tags like v1 and v1.2 which would corrupt version detection.
            tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"

            commit_parsers = [
              { message = "^feat", group = "Features" },
              { message = "^fix\\(deps\\)", group = "Dependencies" },
              { message = "^fix", group = "Bug Fixes" },
              { message = "^perf", group = "Performance" },
              { message = "^refactor", group = "Refactor" },
              { message = "^doc", group = "Documentation" },
              { message = "^style", skip = true },
              { message = "^test", skip = true },
              { message = "^chore", skip = true },
              { message = "^ci", skip = true },
              { message = "^build", skip = true },
            ]

            # git-cliff v2 moved bump settings out of [git] into a dedicated [bump] section.
            # Keeping them in [git] silently ignores them and falls back to the hardcoded
            # default initial_tag of 0.1.0, which fails the tag_pattern validation.
            [bump]
            features_always_bump_minor = true
            breaking_always_bump_major = true
            initial_tag = "v1.0.0"
        run: |
          printf '%s\n' "$CLIFF_TOML" > cliff.toml

      # The v*.*.* glob excludes alias tags (v1, v1.2) so the baseline version
      # is always a full semver tag. An empty result is valid and means no prior
      # releases exist — git-cliff will use initial_tag from cliff.toml.
      # git tag --list is error-checked separately from head -1: a git failure
      # (e.g. missing fetch-tags) is caught and reported; head -1 always succeeds
      # on an empty list and is run unconditionally.
      - name: Get current tag
        id: current
        run: |
          if ! TAG_LIST=$(git tag --list 'v*.*.*' --sort=-version:refname); then
            echo "ERROR: 'git tag --list' failed. Ensure fetch-depth: 0 and fetch-tags: true are set."
            exit 1
          fi

          TAG=$(echo "$TAG_LIST" | head -1)

          if [[ -z "$TAG" ]]; then
            echo "No existing semver tags found. Treating as first release."
          else
            echo "Current latest tag: ${TAG}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      # The action installs the git-cliff binary into $RUNNER_TEMP/git-cliff/bin.
      # NOTE: All action outputs are unreliable due to a jq bug — do not use them.
      # The binary is called directly in subsequent steps.
      # continue-on-error: true because the action also runs git-cliff (with
      # args: --bumped-version) and any git-cliff error would fail this step. Since
      # we only use this action to install the binary, a run-time error is irrelevant.
      - name: Install git-cliff
        uses: orhun/git-cliff-action@v4
        continue-on-error: true
        with:
          args: --bumped-version

      # Sanity check that the binary landed at the expected path. The action does
      # not add the binary to $GITHUB_PATH, so PATH must be exported explicitly in
      # each subsequent step that calls git-cliff.
      - name: Verify git-cliff installation
        run: |
          export PATH="$RUNNER_TEMP/git-cliff/bin:$PATH"
          if ! command -v git-cliff &>/dev/null; then
            echo "ERROR: git-cliff binary not found at $RUNNER_TEMP/git-cliff/bin."
            echo "  The orhun/git-cliff-action install path may have changed."
            exit 1
          fi
          git-cliff --version

      # Calls git-cliff directly (action outputs are unreliable — see Install git-cliff).
      # Sets skip=true when there are no bump-worthy commits, otherwise sets version.
      # stderr is captured to a temp file so warnings cannot contaminate the version
      # string written to GITHUB_OUTPUT.
      - name: Check if release needed
        id: check
        run: |
          export PATH="$RUNNER_TEMP/git-cliff/bin:$PATH"

          BUMPED=$(git-cliff --bumped-version 2>/tmp/git-cliff-stderr)
          CLIFF_EXIT=$?
          if [[ $CLIFF_EXIT -ne 0 ]]; then
            echo "ERROR: git-cliff --bumped-version failed (exit $CLIFF_EXIT)."
            echo "  Stdout: ${BUMPED}"
            echo "  Stderr: $(cat /tmp/git-cliff-stderr)"
            echo "  PATH used: $PATH"
            exit 1
          fi
          CLIFF_STDERR=$(cat /tmp/git-cliff-stderr)
          if [[ -n "$CLIFF_STDERR" ]]; then
            echo "WARNING: git-cliff wrote to stderr: ${CLIFF_STDERR}"
          fi

          CURRENT="${{ steps.current.outputs.tag }}"

          if [[ -z "$BUMPED" || "$BUMPED" == "$CURRENT" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No version bump needed (git-cliff returned '${BUMPED}', current is '${CURRENT}'). Skipping release."
          else
            echo "version=${BUMPED}" >> "$GITHUB_OUTPUT"
            echo "Next version: ${BUMPED}"
          fi

      # Calls git-cliff directly (action outputs are unreliable — see Install git-cliff).
      # VERSION is passed via env rather than inlined in args: to avoid expression
      # interpolation. Multiline output is written to GITHUB_OUTPUT using the heredoc
      # delimiter syntax so the downstream step can read it as steps.changelog.outputs.content.
      # stderr is captured to a temp file so warnings cannot contaminate the changelog content.
      - name: Generate changelog
        id: changelog
        if: steps.check.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          export PATH="$RUNNER_TEMP/git-cliff/bin:$PATH"

          CHANGELOG=$(git-cliff --unreleased --strip header --tag "$VERSION" 2>/tmp/git-cliff-stderr)
          CLIFF_EXIT=$?
          if [[ $CLIFF_EXIT -ne 0 ]]; then
            echo "ERROR: git-cliff failed to generate changelog for version '${VERSION}' (exit $CLIFF_EXIT)."
            echo "  Stdout: ${CHANGELOG}"
            echo "  Stderr: $(cat /tmp/git-cliff-stderr)"
            exit 1
          fi
          CLIFF_STDERR=$(cat /tmp/git-cliff-stderr)
          if [[ -n "$CLIFF_STDERR" ]]; then
            echo "WARNING: git-cliff wrote to stderr during changelog generation: ${CLIFF_STDERR}"
          fi

          {
            echo "content<<CLIFF_OUTPUT"
            echo "$CHANGELOG"
            echo "CLIFF_OUTPUT"
          } >> "$GITHUB_OUTPUT"

      # CHANGELOG is passed via env rather than inlined as ${{ steps.changelog.outputs.content }}
      # because changelog content is derived from commit messages (user-controlled)
      # and must not be interpolated directly into a run: block.
      # --notes-file is used instead of --notes to avoid passing commit-message-derived
      # content as a shell argument.
      - name: Create GitHub Release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.check.outputs.version }}
          CHANGELOG: ${{ steps.changelog.outputs.content }}
        run: |
          if [[ -z "$VERSION" ]]; then
            echo "ERROR: VERSION is empty. The 'check' step did not produce a version output."
            exit 1
          fi

          if [[ -z "$CHANGELOG" ]]; then
            echo "ERROR: CHANGELOG is empty. The 'changelog' step did not produce content."
            echo "  Check the 'Generate changelog' step logs for git-cliff errors."
            echo "  If git-cliff succeeded but content is empty, there may be no unreleased commits."
            exit 1
          fi

          NOTES_FILE=$(mktemp)
          echo "$CHANGELOG" > "$NOTES_FILE"

          echo "Creating GitHub release '${VERSION}' targeting ${GITHUB_SHA}"

          if ! gh release create "$VERSION" \
            --notes-file "$NOTES_FILE" \
            --target "$GITHUB_SHA"; then
            echo "ERROR: 'gh release create' failed for version '${VERSION}'."
            echo "  If this is a re-run, the release may already exist."
            rm -f "$NOTES_FILE"
            exit 1
          fi

          rm -f "$NOTES_FILE"
          echo "Successfully created release ${VERSION}"

      # Alias tags (vN, vN.M) allow consumers to pin to a major or minor version
      # without tracking patch releases. They are force-pushed to the new commit
      # after each release. Each push is handled separately so a failure on the
      # first does not silently leave the second tag in a stale state.
      # git config identity is set defensively — these are lightweight tags (no -a/-m
      # flag) and do not embed author information, but some environments require it.
      - name: Update alias tags
        if: steps.check.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: VERSION '${VERSION}' does not match expected format vMAJOR.MINOR.PATCH."
            echo "  Refusing to create alias tags from a malformed version string."
            exit 1
          fi

          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if ! git tag -f "$MAJOR" "$GITHUB_SHA"; then
            echo "ERROR: Failed to create local alias tag '${MAJOR}' pointing to ${GITHUB_SHA}."
            exit 1
          fi
          if ! git tag -f "$MINOR" "$GITHUB_SHA"; then
            echo "ERROR: Failed to create local alias tag '${MINOR}' pointing to ${GITHUB_SHA}."
            exit 1
          fi

          echo "Pushing alias tag ${MAJOR} -> ${GITHUB_SHA}"
          if ! git push origin "$MAJOR" --force; then
            echo "ERROR: Failed to force-push alias tag '${MAJOR}'."
            echo "  Version: ${VERSION}, Target: ${GITHUB_SHA}"
            echo "  Recovery: git tag -f ${MAJOR} ${GITHUB_SHA} && git push origin ${MAJOR} --force"
            exit 1
          fi
          echo "Successfully pushed ${MAJOR}"

          echo "Pushing alias tag ${MINOR} -> ${GITHUB_SHA}"
          if ! git push origin "$MINOR" --force; then
            echo "ERROR: Failed to force-push alias tag '${MINOR}'."
            echo "  Version: ${VERSION}, Target: ${GITHUB_SHA}"
            echo "  Note: '${MAJOR}' was updated successfully. Only '${MINOR}' failed."
            echo "  Recovery: git tag -f ${MINOR} ${GITHUB_SHA} && git push origin ${MINOR} --force"
            exit 1
          fi
          echo "Successfully pushed ${MINOR}"

  # Runs on pull_request_target for Dependabot PRs only. Dependabot cannot natively
  # assign different commit prefixes per semver update type, so this job detects
  # major version bumps and rewrites the PR title from fix(deps): to feat(deps)!:
  # so that squash-merging produces the correct conventional commit for a major bump.
  # Uses pull_request_target (not pull_request) because GitHub gives fork-originated
  # workflows a structurally read-only token under pull_request — explicit permissions:
  # blocks cannot elevate it. pull_request_target runs in the base branch context with
  # the full repo token. Safe because PR code is never checked out.
  dependabot-major-prefix:
    if: inputs.trigger == 'pull_request_target' && github.actor == 'dependabot[bot]'
    needs: init-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Fetch metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2

      # Log the update type so it is visible in CI and verify the action produced
      # a value — an empty output would silently skip the title rewrite, causing a
      # major Dependabot update to be merged with the wrong semver bump.
      - name: Log update type
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        run: |
          if [[ -z "$UPDATE_TYPE" ]]; then
            echo "ERROR: fetch-metadata produced no update-type output."
            echo "  This may indicate the action's output format has changed."
            exit 1
          fi
          echo "Dependabot update-type: ${UPDATE_TYPE}"

      # PR_TITLE is passed via env rather than inlined in the run: block to prevent
      # shell injection — pull_request_target runs with write permissions and PR titles
      # are user-controlled input.
      - name: Rewrite title for major updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          NEW_TITLE="${PR_TITLE/fix(deps)/feat(deps)!}"

          if [[ "$NEW_TITLE" == "$PR_TITLE" ]]; then
            echo "ERROR: Title substitution produced no change."
            echo "  Original title: '${PR_TITLE}'"
            echo "  Expected pattern 'fix(deps)' not found. Check dependabot commit-message prefix configuration."
            exit 1
          fi

          echo "Rewriting PR #${PR_NUMBER} title:"
          echo "  Before: '${PR_TITLE}'"
          echo "  After:  '${NEW_TITLE}'"

          if ! gh pr edit "$PR_NUMBER" --title "$NEW_TITLE"; then
            echo "ERROR: Failed to update PR #${PR_NUMBER} title to '${NEW_TITLE}'."
            exit 1
          fi
