name: Release Workflow

on:
  workflow_call:
    inputs:
      trigger:
        description: The calling repo's github.event_name
        required: true
        type: string

jobs:
  # Runs on every trigger (push and pull_request_target) to catch misconfigured
  # repository settings before a bad merge can land. Squash merge must be enabled
  # and merge commits must be disabled — both are required for git-cliff to produce
  # correct semver bumps from PR titles used as squash commit messages.
  init-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Init check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          REPO_DATA=$(gh api "/repos/$REPO")
          SQUASH=$(echo "$REPO_DATA" | jq -r '.allow_squash_merge')
          MERGE=$(echo "$REPO_DATA" | jq -r '.allow_merge_commit')

          if [[ "$SQUASH" != "true" || "$MERGE" != "false" ]]; then
            echo "ERROR: Repository must have squash merge enabled and merge commits disabled."
            echo "  allow_squash_merge: $SQUASH (expected: true)"
            echo "  allow_merge_commit: $MERGE (expected: false)"
            exit 1
          fi

  # Runs on push to main. Calculates the next semver version from conventional
  # commits since the last tag, generates a changelog, creates a GitHub release,
  # and force-updates the vN and vN.M alias tags to the new commit. Skips
  # automatically when no version-bump-worthy commits exist since the last tag.
  release:
    if: inputs.trigger == 'push'
    needs: init-check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required for git-cliff to walk all commits
          fetch-tags: true # tags required to determine the current version baseline

      # The cliff.toml config is bundled here rather than committed to consuming
      # repos so that all consumers share a single canonical configuration.
      - name: Write cliff.toml
        run: |
          cat > cliff.toml << 'EOF'
          [changelog]
          header = ""
          body = """
          {% for group, commits in commits | group_by(attribute="group") %}
          ### {{ group | upper_first }}\n
          {% for commit in commits %}
          - {{ commit.message | upper_first }}\
          {% endfor %}
          {% endfor %}
          """
          trim = true

          [git]
          conventional_commits = true
          filter_unconventional = true
          filter_commits = false
          # Restricts git-cliff to full semver tags only (e.g. v1.2.3).
          # Excludes alias tags like v1 and v1.2 which would corrupt version detection.
          tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
          initial_tag = "v1.0.0"
          features_always_bump_minor = true
          breaking_always_bump_major = true

          commit_parsers = [
            { message = "^feat", group = "Features" },
            { message = "^fix\\(deps\\)", group = "Dependencies" },
            { message = "^fix", group = "Bug Fixes" },
            { message = "^perf", group = "Performance" },
            { message = "^refactor", group = "Refactor" },
            { message = "^doc", group = "Documentation" },
            { message = "^style", skip = true },
            { message = "^test", skip = true },
            { message = "^chore", skip = true },
            { message = "^ci", skip = true },
            { message = "^build", skip = true },
          ]
          EOF

      # The v*.*.*  glob excludes alias tags (v1, v1.2) so the baseline version
      # is always a full semver tag. An empty result means no prior releases exist
      # and git-cliff will use initial_tag from cliff.toml as the starting point.
      - name: Get current tag
        id: current
        run: |
          TAG=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)
          if [[ -z "$TAG" ]]; then
            echo "No existing semver tags found. Treating as first release."
          else
            echo "Current latest tag: ${TAG}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      # The action installs the git-cliff binary into $RUNNER_TEMP/git-cliff/bin.
      # NOTE: outputs.version and outputs.stdout from this action are broken due to
      # a jq bug — do not use them. The binary is called directly in the next step.
      - name: Install git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          args: --bumped-version

      # Calls git-cliff directly (action outputs are unreliable — see above).
      # Sets skip=true when there are no bump-worthy commits, otherwise sets version.
      # stderr is captured alongside stdout so tool errors surface rather than
      # silently resolving to an empty BUMPED value and a false skip=true.
      - name: Check if release needed
        id: check
        run: |
          export PATH="$RUNNER_TEMP/git-cliff/bin:$PATH"

          if ! BUMPED=$(git-cliff --bumped-version 2>&1); then
            echo "ERROR: git-cliff --bumped-version failed."
            echo "Output: ${BUMPED}"
            echo "PATH used: $PATH"
            exit 1
          fi

          CURRENT="${{ steps.current.outputs.tag }}"

          if [[ -z "$BUMPED" || "$BUMPED" == "$CURRENT" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No version bump needed (git-cliff returned '${BUMPED}', current is '${CURRENT}'). Skipping release."
          else
            echo "version=${BUMPED}" >> "$GITHUB_OUTPUT"
            echo "Next version: ${BUMPED}"
          fi

      # Uses outputs.content (heredoc format) rather than outputs.stdout — the
      # latter is affected by the same jq bug as outputs.version above.
      - name: Generate changelog
        id: changelog
        if: steps.check.outputs.skip != 'true'
        uses: orhun/git-cliff-action@v4
        with:
          args: --unreleased --strip header --tag ${{ steps.check.outputs.version }}

      # CHANGELOG is passed via env rather than inlined as ${{ steps.changelog.outputs.content }}
      # because changelog content is derived from commit messages (user-controlled)
      # and must not be interpolated directly into a run: block.
      - name: Create GitHub Release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.check.outputs.version }}
          CHANGELOG: ${{ steps.changelog.outputs.content }}
        run: |
          if [[ -z "$VERSION" ]]; then
            echo "ERROR: VERSION is empty. The 'check' step did not produce a version output."
            exit 1
          fi

          if [[ -z "$CHANGELOG" ]]; then
            echo "ERROR: CHANGELOG is empty. The 'changelog' step did not produce content."
            echo "  This may indicate the orhun/git-cliff-action outputs.content bug has regressed."
            exit 1
          fi

          echo "Creating GitHub release '${VERSION}' targeting ${GITHUB_SHA}"

          if ! gh release create "$VERSION" \
            --notes "$CHANGELOG" \
            --target "$GITHUB_SHA"; then
            echo "ERROR: 'gh release create' failed for version '${VERSION}'."
            echo "  If this is a re-run, the release may already exist."
            exit 1
          fi

          echo "Successfully created release ${VERSION}"

      # Alias tags (vN, vN.M) allow consumers to pin to a major or minor version
      # without tracking patch releases. They are force-pushed to the new commit
      # after each release. Each push is handled separately so a failure on the
      # first does not silently leave the second tag in a stale state.
      - name: Update alias tags
        if: steps.check.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -f "$MAJOR" "$GITHUB_SHA"
          git tag -f "$MINOR" "$GITHUB_SHA"

          echo "Pushing alias tag ${MAJOR} -> ${GITHUB_SHA}"
          if ! git push origin "$MAJOR" --force; then
            echo "ERROR: Failed to force-push alias tag '${MAJOR}'."
            echo "  Version: ${VERSION}, Target: ${GITHUB_SHA}"
            echo "  Recovery: git tag -f ${MAJOR} ${GITHUB_SHA} && git push origin ${MAJOR} --force"
            exit 1
          fi
          echo "Successfully pushed ${MAJOR}"

          echo "Pushing alias tag ${MINOR} -> ${GITHUB_SHA}"
          if ! git push origin "$MINOR" --force; then
            echo "ERROR: Failed to force-push alias tag '${MINOR}'."
            echo "  Version: ${VERSION}, Target: ${GITHUB_SHA}"
            echo "  Note: '${MAJOR}' was updated successfully. Only '${MINOR}' failed."
            echo "  Recovery: git tag -f ${MINOR} ${GITHUB_SHA} && git push origin ${MINOR} --force"
            exit 1
          fi
          echo "Successfully pushed ${MINOR}"

  # Runs on pull_request_target for Dependabot PRs only. Dependabot cannot natively
  # assign different commit prefixes per semver update type, so this job detects
  # major version bumps and rewrites the PR title from fix(deps): to feat(deps)!:
  # so that squash-merging produces the correct conventional commit for a major bump.
  # Uses pull_request_target (not pull_request) because Dependabot PRs have read-only
  # tokens under the pull_request event. Safe because PR code is never checked out.
  dependabot-major-prefix:
    if: inputs.trigger == 'pull_request_target' && github.actor == 'dependabot[bot]'
    needs: init-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Fetch metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2

      # PR_TITLE is passed via env rather than inlined in the run: block to prevent
      # shell injection — pull_request_target runs with write permissions and PR titles
      # are user-controlled input.
      - name: Rewrite title for major updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          NEW_TITLE="${PR_TITLE/fix(deps)/feat(deps)!}"

          if [[ "$NEW_TITLE" == "$PR_TITLE" ]]; then
            echo "WARNING: Title substitution produced no change."
            echo "  Original title: '${PR_TITLE}'"
            echo "  Expected pattern 'fix(deps)' not found. Check dependabot commit-message prefix configuration."
            exit 1
          fi

          echo "Rewriting PR #${PR_NUMBER} title:"
          echo "  Before: '${PR_TITLE}'"
          echo "  After:  '${NEW_TITLE}'"

          if ! gh pr edit "$PR_NUMBER" --title "$NEW_TITLE"; then
            echo "ERROR: Failed to update PR #${PR_NUMBER} title to '${NEW_TITLE}'."
            exit 1
          fi
